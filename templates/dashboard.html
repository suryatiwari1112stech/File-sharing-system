<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f9;
        }

        .header {
            background: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
        }

        .container {
            padding: 20px;
            text-align: center;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px auto;
            width: 90%;
            max-width: 350px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .card a {
            text-decoration: none;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #007bff;
            color: white;
            border-radius: 6px;
            border: none;
            font-size: 15px;
            cursor: pointer;
        }

        .btn:hover {
            background: #0056b3;
        }

        .logout {
            background: red;
        }

        .logout:hover {
            background: darkred;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .header {
                font-size: 16px;
            }

            .btn {
                font-size: 14px;
                padding: 10px;
            }
        }

    </style>

</head>

<body>

    <div class="header">
        Welcome {{user}}
    </div>

    <div class="container">

        <h3>User Dashboard</h3>

        <div class="card">
            <a href="/upload">
                <button class="btn">Upload Notes</button>
            </a>

            <a href="/notes">
                <button class="btn">View Notes</button>
            </a>

            <a href="/my_notes">
                <button class="btn">My Notes</button>
            </a>

            <a href="/logout">
                <button class="btn logout">Logout</button>
            </a>
        </div>

    </div>

</body>

</html>
