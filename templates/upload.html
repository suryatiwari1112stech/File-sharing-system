<!DOCTYPE html>
<html>

<head>
    <title>Upload Notes</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f9;
        }

        .header {
            background: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
        }

        .container {
            width: 90%;
            max-width: 400px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        input[type="file"] {
            padding: 8px;
            background: #f9f9f9;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #007bff;
        }

        /* Mobile */
        @media (max-width: 600px) {
            .container {
                margin: 20px auto;
                padding: 20px;
            }

            h2 {
                font-size: 18px;
            }

            input, button {
                font-size: 14px;
            }
        }

    </style>

</head>

<body>

    <div class="header">
        Upload Notes
    </div>

    <div class="container">

        <h2>Add New Notes</h2>

        <form method="post" action="/upload_notes" enctype="multipart/form-data">

            <input type="text" name="title" placeholder="Notes Title" required>

            <input type="text" name="category" placeholder="Category" required>

            <input type="file" name="file" required>

            <button type="submit">Upload</button>

        </form>

        <a href="/dashboard">⬅ Back to Dashboard</a>

    </div>

</body>

</html>
